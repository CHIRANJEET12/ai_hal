planner_task:
  description: >
    Given the user query: "{user_query}"

    Break it into:

    1. Intent:
       - What the user is really asking (1–2 lines)

    2. Sub-questions:
       - 3 to 5 focused, non-overlapping questions

    3. Search Queries:
       - 3 to 5 optimized search engine queries
       - Use concise, keyword-style phrasing (like Google search)

    Rules:
    - Avoid vague terms
    - Keep everything precise and specific

    Format your response clearly like this:

    Intent:
    ...

    Sub-questions:
    1. ...
    2. ...
    3. ...

    Search Queries:
    1. ...
    2. ...
    3. ...

  expected_output: >
    A clearly structured text with intent, sub-questions, and search queries.

  agent: planner


search_task_1:
  description: >
    Use the search queries generated by the planner.

    For each query:
    - Find 3–5 relevant sources
    - Extract key useful information

    Present results clearly:

    Sources:
    1. Title: ...
       URL: ...
    2. Title: ...
       URL: ...

    Extracted Content:
    - ...
    - ...
    - ...

    Rules:
    - Keep content concise
    - Focus only on relevant information

  expected_output: >
    A structured list of sources and extracted content.

  agent: search_agent_1
  context:
    - planner_task


validation_task:
  description: >
    Use the sources and content from the previous task.

    Perform:

    1. Remove duplicate sources
    2. Evaluate each source for credibility
    3. Score each source (0 to 1) based on:
       - reliability
       - relevance
       - agreement with other sources
    4. Keep top 5 sources
    5. Keep only high-quality content

    Additional rules:
    - If multiple sources agree → increase score
    - If content is vague → reduce score

    Output format:

    Validated Sources:
    1. Title: ...
       URL: ...
       Score: ...
       Reason: ...

    Validated Content:
    - ...
    - ...

  expected_output: >
    A filtered and scored list of sources and content.

  agent: source_validator
  context:
    - search_task_1

extraction_task:
  description: >
    Use the validated content from the previous task.

    Extract clean factual statements.

    Rules:
    - Only factual statements
    - Remove redundancy
    - Remove vague or speculative text
    - Keep statements short and precise
    - Merge similar statements
    - Prefer widely supported facts

    Output format:

    Facts:
    1. ...
    2. ...
    3. ...

  expected_output: >
    A clean list of factual statements.

  agent: extractor
  context:
    - validation_task


answer_task:
  description: >
    Use the extracted facts and validated sources from previous steps.

    Generate a final answer.

    Rules:
    - Use ONLY the provided facts
    - Do NOT add new information
    - Combine facts into a clear explanation
    - If facts are insufficient → say "Insufficient information"
    - If facts conflict → mention the conflict

    Also include:
    - Confidence score (0 to 1)
    - Short justification

    Output format:

    Answer:
    ...

    Confidence:
    ...

    Justification:
    ...

  expected_output: >
    A clear answer with confidence and justification.

  agent: answer_generator
  context:
    - extraction_task